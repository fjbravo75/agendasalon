name: Calidad

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Django, cobertura y dependencias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: ruff check .
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - run: coverage run manage.py test --verbosity 1
      - run: coverage report
      - run: pip-audit -r requirements.txt
      - run: python -m pip check

  postgres:
    name: Django sobre PostgreSQL 17
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: agendasalon_test
          POSTGRES_USER: agendasalon
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agendasalon -d agendasalon_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.postgres_test
      DJANGO_SECRET_KEY: test-only-ci-secret-key-with-more-than-50-characters
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_DATABASE_URL: postgresql://agendasalon:test-only-password@127.0.0.1:5432/agendasalon_test?sslmode=disable
      AGENDA_PLATFORM_LEGAL_NAME: AgendaSalon CI
      AGENDA_PLATFORM_TAX_ID: TEST-00000000
      AGENDA_PLATFORM_LEGAL_ADDRESS: Entorno efímero de integración
      AGENDA_PLATFORM_PRIVACY_EMAIL: privacy-ci@example.test
      AGENDA_PLATFORM_WEBSITE: https://example.test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python manage.py migrate --noinput
      - run: python manage.py test --verbosity 1

  frontend:
    name: React y build Vite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=high

  secrets:
    name: Historial sin secretos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Gitleaks sobre el historial completo
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: safe.directory
          GIT_CONFIG_VALUE_0: /github/workspace
        with:
          args: detect --source=/github/workspace --no-banner --redact --exit-code=1
